{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="auth-wrappe container">
    <div class="auth-content">
        <div class="row d-flex justify-content-center align-items-center vh-100">
            <div class="col-md-9 col-lg-6 col-xl-5">
                <img src="{% static 'img/bg-img/Logo.png' %}"class="img-fluid" alt="Sample image">
            </div>
            <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
                {% include 'partials/_alertas.html' %}
                <div class="contact-form-area">
                    <form action="{% url 'cadastro' %}" method="POST">
                        {% csrf_token %}
                        <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                            <p class="lead fw-normal mb-0 me-3"><i class="bi bi-person-check"></i> Registro</p>
                        </div>

                        <div class="divider d-flex align-items-center my-3"></div>

                        <!-- Name input -->
                        <div class="form-outline mb-4">
                            <input type="text" id="nome" name="nome" class="form-control form-control-lg" placeholder="Ex.:Rangel Braga" required/>
                            <label class="form-label" for="nome">Nome Completo</label>
                        </div>
                        
                        <!-- Email input -->
                        <div class="form-outline mb-4">
                            <input type="text" id="email" name="email" class="form-control form-control-lg" placeholder="Ex.: rangel.braga@email.com" required/>
                            <label class="form-label" for="email">Email</label>
                        </div>
        
                        <!-- Password input -->
                        <div class="form-outline mb-3">
                            <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Digite sua senha" required/>
                            <label class="form-label" for="password">Senha</label>
                        </div>

                        <!-- Password input -->
                        <div class="form-outline mb-3">
                            <input type="password" id="password2" name="password2" class="form-control form-control-lg" placeholder="Digite sua senha mais uma vez" required/>
                            <label class="form-label" for="password2">Confirmação de senha</label>
                        </div>
        
                        <div class="text-center text-lg-start mt-4 pt-2">
                            <button type="submit" class="btn btn-success btn-lg" style="padding-left: 2.5rem; padding-right: 2.5rem;">Criar sua conta</button>
                            <button type="button" class="btn btn-primary btn-lg" style="padding-left: 2.5rem; padding-right: 2.5rem;" onclick="exibirCriarConta()">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    function exibirCriarConta(){
         location.href = "{% url 'login' %}";
    }
</script>
{% endblock %}
