{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="auth-wrappe container">
    <div class="auth-content">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-9 col-lg-6 col-xl-5">
                <img src="{% static 'img/bg-img/Logo.png' %}"class="img-fluid" alt="Sample image">
            </div>
            <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
                <div class="contact-form-area">
                    <form action="{% url 'login' %}" method="POST">
                        {% include 'partials/_alertas.html' %}
                        {% csrf_token %}
                        <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                            <p class="lead fw-normal mb-0 me-3"><i class="bi bi-box-arrow-in-right"></i> Login</p>
                        </div>

                        <div class="divider d-flex align-items-center my-3"></div>
                        
                        <!-- Email input -->
                        <div class="form-outline mb-4">
                            <input type="text" id="email" name="email" class="form-control form-control-lg" placeholder="Entre com o email válido" />
                            <label class="form-label" for="email">Email</label>
                        </div>
        
                        <!-- Password input -->
                        <div class="form-outline mb-3">
                            <input type="password" id="senha" name="senha" class="form-control form-control-lg" placeholder="Entre com a senha" />
                            <label class="form-label" for="senha">Senha</label>
                        </div>
        
                        <div class="text-center text-lg-start mt-4 pt-2">
                            <button type="submit" class="btn btn-success btn-lg" style="padding-left: 2.5rem; padding-right: 2.5rem;">Entrar</button>
                            <p class="small fw-bold mt-2 pt-1 mb-0">Ainda não tem conta?
                                <a href="{% url 'cadastro' %}"class="link-danger">Clique aqui</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
